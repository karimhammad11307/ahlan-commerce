version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ahlan
      POSTGRES_PASSWORD: ahlan_dev
      POSTGRES_DB: ahlan_commerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahlan -d ahlan_commerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahlan

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahlan

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://ahlan:ahlan_dev@postgres:5432/ahlan_commerce
      REDIS_URL: redis://redis:6379
      API_BIND_ADDR: 0.0.0.0:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - ahlan

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["./api", "worker"]
    environment:
      DATABASE_URL: postgres://ahlan:ahlan_dev@postgres:5432/ahlan_commerce
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ahlan

  admin:
    build:
      context: apps/admin
      dockerfile: Dockerfile.admin
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - ahlan

volumes:
  postgres_data:

networks:
  ahlan:
    driver: bridge
