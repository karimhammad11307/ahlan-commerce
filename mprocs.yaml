procs:
  api:
    shell: "make run-api"
  postgres:
    shell: "make db-start && (docker logs -f ahlan_db 2>/dev/null || tail -f /var/log/postgresql/postgresql-16-main.log || tail -f /var/log/postgresql/postgresql-*-main.log || echo 'Cannot tail native postgres logs. Native postgres is running.')"
  admin:
    shell: "cd apps/admin && npm run dev"
  worker:
    shell: "make run-worker"
